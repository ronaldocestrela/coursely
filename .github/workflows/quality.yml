name: Quality

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore Coursely.slnx

      - name: Build
        run: dotnet build Coursely.slnx --configuration Release --no-restore

      - name: Test (with coverage + architecture suite)
        run: >-
          dotnet test Coursely.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory "${{ github.workspace }}/TestResults"

      - name: Upload coverage reports
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: TestResults/**/*coverage*.xml
          if-no-files-found: warn

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Production build
        run: npm run build
